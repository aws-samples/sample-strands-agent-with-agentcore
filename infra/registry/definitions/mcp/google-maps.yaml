name: google-maps
description: Google Maps search, directions, geocoding, and map display
tools:
  - name: search_places
    description: "Search for places using text query like 'restaurants in Manhattan' or 'hotels near Times Square'. Returns up to 10 results with place_id, name, ratings, address, and location coordinates. Use place_id with get_place_details for reviews and contact info."
    input_type: object
    input_description: Place search parameters
    properties:
      - { name: query, type: string, description: "Search query (e.g., 'Italian restaurant in SoHo' or 'coffee shops near Central Park')", required: true }
      - { name: location, type: string, description: "Optional: Center location as 'lat,lng' to bias results" }
      - { name: radius, type: integer, description: "Optional: Search radius in meters (max 50000)" }
      - { name: type, type: string, description: "Optional: Place type (e.g., 'restaurant', 'tourist_attraction', 'lodging')" }
      - { name: open_now, type: boolean, description: "Optional: Only return places that are open now" }
      - { name: language, type: string, description: "Optional: Language code (default: 'en')" }
  - name: search_nearby_places
    description: "Search for places within radius of coordinates. Requires location (lat,lng) and radius in meters. Use for 'nearby' or 'closest' queries when you have exact coordinates. Returns up to 10 results with place details."
    input_type: object
    input_description: Nearby search parameters
    properties:
      - { name: location, type: string, description: "Center location as 'lat,lng' (e.g., '40.7580,-73.9855' for Times Square)", required: true }
      - { name: radius, type: integer, description: "Search radius in meters (max 50000)" }
      - { name: keyword, type: string, description: "Optional: Search keyword" }
      - { name: type, type: string, description: "Optional: Place type (e.g., 'cafe', 'restaurant')" }
      - { name: rank_by, type: string, description: "Optional: 'prominence' (default) or 'distance'" }
      - { name: language, type: string, description: "Optional: Language code (default: 'en')" }
  - name: get_place_details
    description: "Get detailed info about a place using place_id from search results. Returns address, phone, website, opening hours, up to 5 reviews, and photos count. Use when user wants reviews, contact information, or operating hours."
    input_type: object
    input_description: Place details parameters
    properties:
      - { name: place_id, type: string, description: Place ID from search results, required: true }
      - { name: language, type: string, description: "Optional: Language code (default: 'en')" }
      - { name: reviews_sort, type: string, description: "Optional: 'most_relevant' (default) or 'newest'" }
  - name: get_directions
    description: "Get turn-by-turn directions between two locations. Supports 4 modes: driving, walking, bicycling, transit. Returns distance, duration, and step-by-step instructions. Can avoid tolls/highways/ferries and provide alternative routes."
    input_type: object
    input_description: Directions parameters
    properties:
      - { name: origin, type: string, description: "Starting point (address or 'lat,lng')", required: true }
      - { name: destination, type: string, description: "Destination (address or 'lat,lng')", required: true }
      - { name: mode, type: string, description: "Optional: Travel mode - 'driving' (car, default), 'walking' (pedestrian), 'bicycling' (bike), 'transit' (bus/subway). Choose based on user's transportation method." }
      - { name: alternatives, type: boolean, description: "Optional: Return alternative routes" }
      - { name: avoid, type: string, description: "Optional: 'tolls', 'highways', 'ferries'" }
      - { name: language, type: string, description: "Optional: Language code (default: 'en')" }
  - name: geocode_address
    description: "Convert address to coordinates (lat, lng). Returns formatted address, coordinates, place_id, and location_type. Use when you need coordinates for nearby search or mapping. Can return multiple results if address is ambiguous."
    input_type: object
    input_description: Geocoding parameters
    properties:
      - { name: address, type: string, description: "Address to geocode (e.g., '1600 Amphitheatre Parkway, Mountain View, CA' or '350 5th Ave, New York, NY')", required: true }
      - { name: language, type: string, description: "Optional: Language code (default: 'en')" }
      - { name: region, type: string, description: "Optional: Country code for result bias (e.g., 'us', 'kr', 'jp'). Helps disambiguate addresses." }
  - name: reverse_geocode
    description: "Convert coordinates to address. Input format: 'lat,lng' (e.g., '40.7580,-73.9855'). Returns multiple address formats from specific (street) to general (city, country). Use when you have coordinates and need the address."
    input_type: object
    input_description: Reverse geocoding parameters
    properties:
      - { name: latlng, type: string, description: "Coordinates as 'lat,lng' (e.g., '40.7580,-73.9855' for Times Square)", required: true }
      - { name: language, type: string, description: "Optional: Language code (default: 'en')" }
  - name: show_on_map
    description: "Display locations, routes, or areas on an interactive Google Map. Use after collecting location data from search or directions. Show 1-5 most relevant places per map."
    input_type: object
    input_description: Map visualization parameters
    properties:
      - { name: map_type, type: string, description: "Type of map: 'markers' (location pins), 'directions' (route), or 'area' (region). Must be one of: markers, directions, area", required: true }
      - { name: markers, type: array, description: "List of location markers (required for map_type='markers')" }
      - { name: directions, type: object, description: "Route data (required for map_type='directions')" }
      - { name: center, type: object, description: "Map center {lat, lng}. Auto-calculated if omitted." }
      - { name: zoom, type: number, description: "Zoom level 1-20 (1=World, 20=Buildings). Auto-calculated if omitted. Valid range: 1-20" }
