name: weather
description: Open-Meteo weather (current + forecast)
tools:
  - name: get_today_weather
    description: Get today's weather with current conditions and hourly forecast (24 hours). Includes temperature, humidity, wind, precipitation, and weather conditions. Powered by Open-Meteo API (worldwide coverage).
    input_type: object
    input_description: Weather query parameters
    properties:
      - { name: city_name, type: string, description: "City name (e.g., 'Seoul', 'New York', 'London')", required: true }
      - { name: country, type: string, description: "Optional: Country name for disambiguation (e.g., 'South Korea', 'USA')" }
  - name: get_weather_forecast
    description: Get multi-day weather forecast with daily max/min temperatures, precipitation, sunrise/sunset. Supports 1-16 days forecast. Powered by Open-Meteo API (worldwide coverage).
    input_type: object
    input_description: Forecast parameters
    properties:
      - { name: city_name, type: string, description: "City name (e.g., 'Tokyo', 'Paris', 'Sydney')", required: true }
      - { name: days, type: number, description: "Number of forecast days (1-16, default: 7)" }
      - { name: country, type: string, description: "Optional: Country name for disambiguation" }
