name: arxiv
description: ArXiv paper search and retrieval
tools:
  - name: arxiv_search
    description: Search for scientific papers on ArXiv. Returns up to 5 results with title, authors, abstract, and paper ID.
    input_type: object
    input_description: Search parameters
    properties:
      - { name: query, type: string, description: Search query for ArXiv papers, required: true }
  - name: arxiv_get_paper
    description: Get full paper content from ArXiv by paper ID. Supports batch retrieval with comma-separated IDs.
    input_type: object
    input_description: Paper retrieval parameters
    properties:
      - { name: paper_ids, type: string, description: "ArXiv paper ID or comma-separated IDs (e.g., '2308.08155' or '2308.08155,2401.12345')", required: true }
