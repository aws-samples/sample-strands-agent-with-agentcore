version: 2
# Updates are grouped per ecosystem so a weekly run produces a few grouped PRs
# rather than dozens. mobile-app is intentionally NOT tracked (the Expo app is
# not in active use and has no CI build to validate native upgrades).
updates:
  - package-ecosystem: npm
    directory: /chatbot-app/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /chatbot-app/agentcore
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
