version: 2
# open-pull-requests-limit is intentionally 0: it pauses NEW PR creation while
# the existing backlog is triaged. Security updates are unaffected (Dependabot
# always opens those). Raise the limit once the initial backlog is cleared.
updates:
  - package-ecosystem: npm
    directory: /chatbot-app/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    groups:
      frontend:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /mobile-app
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    groups:
      mobile:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /chatbot-app/agentcore
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    groups:
      python:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
